# Reverse proxy nginx → Next.js (port 3000).
# Externe : seuls 80 (et 443 après HTTPS) sont exposés. L'API et Next.js
# restent internes.
#
# Remplace `server_name _;` par ton domaine (ex. `pitch.tondomaine.fr;`)
# avant de lancer certbot pour le HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Taille de body raisonnable + timeouts confortables
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # 90s : couvre le premier calcul de l'analyse approfondie joueur
        # (~38 requêtes API séquentielles au tout premier lancement par
        # équipe/saison ; instantané ensuite grâce au cache).
        proxy_read_timeout 90s;
    }
}
